services:
  - type: web
    name: ecoscan-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MODEL_PATH
        value: ./models/best_model.keras
      - key: MODEL_INPUT_SIZE
        value: 300
      - key: MODEL_CLASSES
        value: Anorganik,B3,Kertas,Organik,Residu
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_USERS_TABLE
        value: app_users
